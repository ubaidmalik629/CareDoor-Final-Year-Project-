{%load static%}
<!DOCTYPE html>
<html>
<head>
    <title>Appointment Booking Confirmation</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/patientstyle.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'all.min.css' %}">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
       .container{
        border: 5px solid #225EA6;
        padding: 10px;
        margin-top: 40px;
        margin-left: auto;
        margin-right: auto;
        width: 35%;
        padding-bottom: 40px;
        padding-top: 40px;
       }
        .message-container {
            margin-top: 50px;
            text-align: center;
        }
        .message-heading {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .message-text {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .back-button {
            margin-top: 20px;
        }
    </style>
</head>
<body style="font-family: 'Times New Roman', Times, serif;">
    <div class="container" style="overflow: auto">
        <div class="message-container">
            <h2 class="message-heading">Appointment Booking Confirmation</h2>
            <p class="message-text">Thank you for booking an appointment with us.</p>
            <p class="message-text">Your appointment has been successfully scheduled.</p>
            <p class="message-text">We look forward to seeing you on the scheduled date and time.</p>
            <a href="#" class="btn btn-primary back-button mt-5">Back to Homepage</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
