{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'all.min.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <title>SignUp To CareDoor</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
*{
    font-family: 'Times New Roman', Times, serif;
}
.wrapper{
    background: #ececec;
    padding: 0 20px 0 20px;
}
.main{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.row{
    width: 1000px;
    height: 600px;
    border-radius: 10px;
    background: #fff;
    box-shadow: 5px 5px 10px 1px rgba(0,0,0,0.2);
}
.side-image{
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    position: relative;
    border-radius: 10px 0 0 10px;
}
img{
    width: 100%;
    position: absolute;
    height: 100%;
    left: 0px;
}
.right{
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}
.input-box{
    width: 330px;
    box-sizing: border-box;
}
.input-box header{
    font-weight: 700;
    text-align: center;
    margin-bottom: 45px;
}
.input-field{
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 0 10px 0 10px;
}
.input{
    height: 45px;
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    outline: none;
    margin-bottom: 20px;
    color: #40414a;
}
.input-box .input-field label{
    position: absolute;
    top: 10px;
    left: 10px;
    pointer-events: none;
    transition: .5s;
}
.input-field .input:focus ~ label{
    top: -10px;
    font-size: 13px;
}
.input-field .input:valid ~ label{
    top: -10px;
    font-size: 13px;
    color: #5d5076;
}
.input-field .input:focus, .input-field .input:valid{
    border-bottom: 1px solid #0D6EFD;
}
@media only screen and (max-width: 768px){
    .side-image{
        border-radius: 10px 10px 0 0;
    }
    img{
        width: 507px;
        position: absolute;
        top: 20px;
    }
    .row{
        max-width: 420px;
        width: 100%;
    }
}
.input-field1{
    display: flex;
    width: 100%;
}
.login{
    text-align: center;
    font-size: small;
    margin-top: 25px;
}
span a{
    text-decoration: none;
    font-weight: 700;
    color: #000;
    transition: .5s;
}
span a:hover{
    text-decoration: underline;
    color: #000;
}
    </style>
<body >
    <div class="wrapper">
    <form id="myForm" method="POST">
        {% csrf_token %}
        <div class="container main">
            <div class="row">
                <div class="col-md-6 side-image">
                    <!-------Image-------->
                    <img src="{% static 'images/login.avif' %}" alt="">
                </div>
                <div class="col-md-6 right">
                     <div class="input-box">
                        {% for message in messages %}
                        <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
                            {{message}}
                        <button type="button" class="close" data-bs-dismiss="alert" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>
                    {% endfor %}
                        <header>SignUp To CareDoor</header>
                        <div class="input-field1">
                        <div class="input-field">
                            <input type="text" class="input" id="nameid" name="f_name" required autocomplete="off">
                            <label for="nameid">First Name</label>
                        </div>
                        <div class="input-field">
                            <input type="text" class="input" id="nameid" name="l_name" required>
                            <label for="nameid">Last Name</label>
                        </div>
                    </div>
                    <div class="input-field1">
                        <div class="input-field">
                            <input type="tel" class="input" id="contact" name="contact" required>
                            <label for="contact">Contact</label>
                        </div>
                        <div class="input-field">
                            <input type="number" class="input" id="age" name="age" required>
                            <label for="age">Age</label>
                        </div>
                        </div>
                        <div class="input-field1">
                            <div class="input-field">
                                <input type="email" class="input" id="email" name="email" required>
                                <label for="email">Email</label>
                            </div>
                        <div class="input-field">
                            <input type="password" class="input" id="password" name="password" required>
                            <label for="password">Password</label>
                        </div>
                
                        </div>
                        <div class="input-field1">
                            <div class="input-field">
                                <input type="gender" class="input" id="gender" name="gender" required>
                                <label for="gender">Gender</label>
                            </div>
                        <div class="input-field">
                            <input type="address" class="input" id="address" name="address" required>
                            <label for="address">Address</label>
                        </div>
                        </div>
                        <div class="input-field">
                            <a style="color: #fff; " class="btn btn-primary text-center" onclick="submitForm()">Sign Up</a> 
                        </div>
                        <div class="login">
                            <span>Already have an account? <a href="/">Login here</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
    </div>
</body>
<script>
    function submitForm() {
        document.getElementById("myForm").submit();
    }
    </script>
</html>
